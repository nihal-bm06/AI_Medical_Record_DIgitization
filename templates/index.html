<!DOCTYPE html>
<html>
<head>
  <title>Medical OCR Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 15px 30px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-size: 20px;
      color: #38bdf8;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 400px;
      background: #020617;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h3 {
      margin-bottom: 10px;
    }

    input {
      margin-top: 10px;
      width: 100%;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #22c55e;
      color: white;
    }

    .download {
      background: #38bdf8;
      color: black;
    }

    .download:hover {
      background: #0ea5e9;
    }

    .progress {
      height: 6px;
      background: #1e293b;
      border-radius: 6px;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      transition: width 0.5s;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

  </style>
</head>

<body>

<header>Medical OCR Dashboard</header>

<div class="container">

  <div class="card">

    <h3>Upload ZIP</h3>

    <input type="file" id="fileInput" accept=".zip">

    <button class="primary" onclick="upload()">Run Extraction</button>

    <div class="progress">
      <div class="bar" id="progressBar"></div>
    </div>

    <div class="status" id="status"></div>

    <div id="downloads" style="display:none; margin-top:15px;">
      <h3>Download Results</h3>

      <button class="download" onclick="downloadFile('csv')">⬇ CSV</button>
      <button class="download" onclick="downloadFile('xlsx')">⬇ Excel</button>
      <button class="download" onclick="downloadFile('json')">⬇ JSON</button>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
